<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#7c3aed" />
  <meta name="description" content="Sistem absensi sekolah digital — mobile-first PWA" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AbsensiKu" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <title>AbsensiKu v5</title>
  <link rel="stylesheet" href="/src/styles.css" />
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" defer></script>
  <!-- SheetJS for Excel import -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" defer></script>
  <!-- QRCode.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
</head>
<body>

<!-- Login Page -->
<div id="login-page">
  <div class="login-bg"></div>
  <div style="position:relative;z-index:1;margin-bottom:auto;padding-top:60px">
    <div class="login-logo">Absensi<span>Ku</span></div>
    <p style="color:var(--text-3);font-size:14px;margin-top:6px">Sistem absensi sekolah digital</p>
  </div>
  <div style="position:relative;z-index:1;margin-top:40px">
    <!-- Role tabs -->
    <div style="display:flex;gap:6px;margin-bottom:20px;background:var(--surface-2);padding:4px;border-radius:14px;border:1px solid var(--border)">
      <button class="login-tab active" data-role="admin"   onclick="setLoginRole('admin')">Admin</button>
      <button class="login-tab"        data-role="guru"    onclick="setLoginRole('guru')">Guru</button>
      <button class="login-tab"        data-role="siswa"   onclick="setLoginRole('siswa')">Siswa</button>
      <button class="login-tab"        data-role="kepsek"  onclick="setLoginRole('kepsek')">Kepsek</button>
    </div>
    <style>
      .login-tab { flex:1; padding:9px 8px; border:none; border-radius:10px; background:transparent; color:var(--text-muted); font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; font-family:'DM Sans',sans-serif; }
      .login-tab.active { background:var(--p700); color:white; box-shadow:0 4px 12px rgba(109,40,217,0.4); }
    </style>

    <form id="login-form" onsubmit="handleLogin(event)" style="display:flex;flex-direction:column;gap:14px">
      <div class="input-group">
        <label class="input-label" id="login-id-label">Email</label>
        <div class="input-icon-wrap">
          <i class="fas fa-envelope input-icon" id="login-id-icon"></i>
          <input class="input" type="email" id="login-identifier" placeholder="admin@sekolah.com" required autocomplete="username" />
        </div>
      </div>
      <div class="input-group">
        <label class="input-label">Password</label>
        <div class="input-icon-wrap" style="position:relative">
          <i class="fas fa-lock input-icon"></i>
          <input class="input" type="password" id="login-password" placeholder="••••••••" required style="padding-right:44px" autocomplete="current-password" />
          <button type="button" onclick="togglePwVis()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px">
            <i class="fas fa-eye" id="pw-eye-icon"></i>
          </button>
        </div>
      </div>
      <div id="login-error" class="hidden" style="background:var(--red-bg);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--red)">
        <i class="fas fa-exclamation-circle" style="margin-right:6px"></i><span id="login-error-msg"></span>
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-full" style="margin-top:4px">
        <span id="login-btn-text"><i class="fas fa-sign-in-alt"></i> Masuk</span>
      </button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:12px;color:var(--text-muted)" id="login-hint">Login admin menggunakan email</p>
  </div>
</div>

<!-- App Shell -->
<div id="app" class="hidden">
  <!-- Top Bar -->
  <header id="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="topbar-btn" id="back-btn" onclick="goBack()" style="display:none">
        <i class="fas fa-arrow-left" style="font-size:14px"></i>
      </button>
      <div id="topbar-title">Dashboard</div>
    </div>
    <div class="topbar-actions">
      <button class="topbar-btn" onclick="toggleNotifPanel()" id="notif-btn">
        <i class="fas fa-bell" style="font-size:14px"></i>
        <span class="badge hidden" id="notif-badge">0</span>
      </button>
      <button class="topbar-btn" onclick="showProfileMenu()" id="profile-btn" style="font-family:'Syne',sans-serif;font-weight:800;font-size:13px" id="user-avatar-btn">
        A
      </button>
    </div>
  </header>

  <!-- Notification Panel -->
  <div id="notif-panel">
    <div style="padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
      <span style="font-family:'Syne',sans-serif;font-weight:700;font-size:14px">Notifikasi</span>
      <button onclick="markAllNotifsRead()" style="font-size:11px;color:var(--p400);background:none;border:none;cursor:pointer;font-weight:600">Tandai semua dibaca</button>
    </div>
    <div id="notif-list" style="max-height:320px;overflow-y:auto">
      <div class="empty-state" style="padding:24px">
        <div class="empty-icon">🔔</div>
        <div class="empty-sub">Belum ada notifikasi</div>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <main id="page-content"></main>

  <!-- Bottom Navigation -->
  <nav id="bottom-nav"></nav>
</div>

<!-- Modal -->
<div id="modal-overlay" onclick="handleModalBackdrop(event)">
  <div class="modal-sheet" id="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Modal</span>
      <button class="modal-close" onclick="closeModal()"><i class="fas fa-times" style="font-size:13px"></i></button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- Toast Container -->
<div id="toast-container"></div>

<!-- Install Banner -->
<div id="install-banner" class="hidden" style="
  position:fixed;bottom:calc(var(--nav-h) + 12px);left:12px;right:12px;
  background:var(--surface-3);border:1px solid var(--p700);border-radius:var(--radius-lg);
  padding:14px 16px;display:flex;align-items:center;gap:12px;z-index:90;
  box-shadow:var(--shadow-lg)">
  <div style="background:linear-gradient(135deg,var(--p700),var(--p500));border-radius:12px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
    <i class="fas fa-download" style="color:white;font-size:16px"></i>
  </div>
  <div style="flex:1">
    <div style="font-weight:700;font-size:13px">Install AbsensiKu</div>
    <div style="font-size:11px;color:var(--text-3);margin-top:1px">Tambah ke layar utama HP</div>
  </div>
  <button onclick="installPWA()" class="btn btn-primary btn-sm">Install</button>
  <button onclick="dismissInstall()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px"><i class="fas fa-times"></i></button>
</div>

<!-- Scripts -->
<script src="/src/services/api.js"></script>
<script src="/src/services/store.js"></script>
<script src="/src/components/toast.js"></script>
<script src="/src/components/modal.js"></script>
<script src="/src/components/calendar.js"></script>
<script src="/src/pages/dashboard/admin.js"></script>
<script src="/src/pages/dashboard/guru.js"></script>
<script src="/src/pages/dashboard/siswa.js"></script>
<script src="/src/pages/dashboard/kepsek.js"></script>
<script src="/src/pages/absensi/harian.js"></script>
<script src="/src/pages/absensi/mapel.js"></script>
<script src="/src/pages/absensi/qr.js"></script>
<script src="/src/pages/kalender.js"></script>
<script src="/src/pages/notifikasi.js"></script>
<script src="/src/pages/import.js"></script>
<script src="/src/pages/admin-pages.js"></script>
<script src="/src/app.js"></script>
</body>
</html>
